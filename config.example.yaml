# ----------------- GeminiMCP-Trader config -----------------

mode: paper           # paper | live | backtest
sandbox: true         # bascule sandbox/live (live ⇒ false + sandbox: false)

universe:
  - BTC-USD
  - ETH-USD
  - SOL-USD

# Boucle de trading (paper / live)
loop_interval_sec: 60

# Risk management
risk:
  max_position_usd: 1000
  max_drawdown_pct: 0.15        # arrête le trading si DD > 15%
  kelly_fraction: 0.25          # taille pos = kelly_fraction * equity
  allow_short: false
  stop_loss_pct: 0.05
  take_profit_pct: 0.12

# Stratégie hybride momentum + sentiment
strategy:
  name: momentum_sentiment
  weights:
    momentum: 0.5
    sentiment: 0.3
    fear_greed: 0.2
  thresholds:
    long: 0.35
    short: -0.35
  momentum:
    lookback_days: 7
    ema_smooth: 24
  sentiment:
    reddit_subs: [wallstreetbets, CryptoCurrency, Bitcoin]
    reddit_limit: 50

# LLM agent (OpenRouter)
llm:
  enabled: true
  model: meta-llama/llama-3.3-70b-instruct:free
  temperature: 0.2
  validate_signals: true        # demande au LLM de challenger chaque signal

# Observabilité
metrics:
  enabled: true
  port: 8000
